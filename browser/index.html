<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>16:9 가로 고정 뷰어</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #1a1a1a; /* 배경은 어둡게 처리하여 몰입감 증대 */
            display: flex;
            align-items: center; /* 세로 중앙 정렬 */
            justify-content: center; /* 가로 중앙 정렬 */
        }

        /* 16:9 비율을 유지하는 컨테이너 */
        .screen-container {
            width: 100%;
            max-width: 1200px; /* 너무 커지지 않게 제한 */
            position: relative;
            padding-top: 56.25%; /* 16:9 비율 유지 공식 (9/16*100) */
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* 내부에 들어갈 실제 웹사이트 */
        .screen-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 2px solid #333;
            border-radius: 8px; /* 디스플레이 느낌을 위해 살짝 라운드 처리 */
        }
    </style>
</head>
<body>

<div class="screen-container">
    <iframe src="https://www.example.com" scrolling="yes"></iframe>
</div>

</body>
</html>
