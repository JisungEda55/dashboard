<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>16:9 Fullscreen Viewer</title>
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #000;
            display: flex; flex-direction: column;
            height: 100vh; overflow: hidden;
            font-family: sans-serif;
        }

        /* 컨트롤 바: 전체 화면 시 숨겨짐 */
        #controls {
            padding: 10px;
            background: #222;
            display: flex; gap: 5px;
            z-index: 100;
        }
        input { flex: 1; padding: 12px; border: none; border-radius: 4px; font-size: 16px; }
        button { padding: 10px 15px; background: #007bff; color: white; border: none; border-radius: 4px; font-weight: bold; }
        .full-btn { background: #28a745; }

        /* 전체 화면이 될 대상 */
        #fullscreen-root {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            width: 100%;
            height: 100%;
        }

        /* 1920x1080 가상 캔버스 */
        #canvas {
            width: 1920px;
            height: 1080px;
            position: absolute;
            transform-origin: center;
            background: #000;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* 전체화면 모드일 때 컨트롤 숨기기 옵션 (선택 사항) */
        :fullscreen #controls { display: none; }
    </style>
</head>
<body>

<div id="controls">
    <input type="text" id="urlInput" placeholder="https:// 주소 입력">
    <button onclick="updateIframe()">이동</button>
    <button class="full-btn" onclick="toggleFullScreen()">전체 화면</button>
</div>

<div id="fullscreen-root">
    <div id="canvas">
        <iframe id="siteFrame" src="about:blank"></iframe>
    </div>
</div>

<script>
    const root = document.getElementById('fullscreen-root');
    const canvas = document.getElementById('canvas');
    const frame = document.getElementById('siteFrame');

    // 1. 화면 크기에 맞춰 1920x1080을 스케일링하는 함수
    function updateScale() {
        const vW = root.clientWidth;
        const vH = root.clientHeight;

        const scaleX = vW / 1920;
        const scaleY = vH / 1080;
        
        // 화면에 여백 없이 꽉 채우려면 Math.max, 여백이 있어도 비율을 지키려면 Math.min
        const scale = Math.min(scaleX, scaleY);
        
        canvas.style.transform = `scale(${scale})`;
    }

    // 2. 주소 이동 함수
    function updateIframe() {
        let url = document.getElementById('urlInput').value;
        if (!url.startsWith('http')) url = 'https://' + url;
        frame.src = url;
    }

    // 3. 전체 화면 토글 함수
    function toggleFullScreen() {
        if (!document.fullscreenElement) {
            root.requestFullscreen().catch(err => {
                alert(`전체 화면 불가: ${err.message}`);
            });
        } else {
            document.exitFullscreen();
        }
    }

    // 이벤트 리스너
    window.addEventListener('resize', () => {
        setTimeout(updateScale, 100); // 전체화면 전환 시 딜레이 대응
    });
    window.onload = updateScale;
    
    // 전체화면 상태 변화 감지하여 스케일 재조정
    document.addEventListener('fullscreenchange', updateScale);
</script>

</body>
</html>
