<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FHD 고정 해상도 뷰어</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden; /* 스크롤 방지 */
        }

        /* 주소창 영역 */
        .controls {
            padding: 10px;
            background: #222;
            display: flex;
            z-index: 100;
        }
        input { flex: 1; padding: 8px; border: none; border-radius: 4px; }
        button { margin-left: 10px; padding: 8px 15px; background: #007bff; color: white; border: none; border-radius: 4px; }

        /* 가상 디스플레이 영역 */
        #viewport {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* 1920x1080으로 강제 고정된 캔버스 */
        #canvas {
            width: 1920px;
            height: 1080px;
            position: absolute;
            transform-origin: center; /* 중앙 기준 축소 */
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

<div class="controls">
    <input type="text" id="urlInput" placeholder="https:// 주소 입력">
    <button onclick="updateIframe()">이동</button>
</div>

<div id="viewport">
    <div id="canvas">
        <iframe id="siteFrame" src="about:blank"></iframe>
    </div>
</div>

<script>
    function updateScale() {
        const viewport = document.getElementById('viewport');
        const canvas = document.getElementById('canvas');
        
        // 부모 영역(내 폰 화면)의 너비와 높이
        const vW = viewport.clientWidth;
        const vH = viewport.clientHeight;

        // 1920x1080 대비 현재 화면의 비율 계산
        const scaleX = vW / 1920;
        const scaleY = vH / 1080;
        
        // 화면에 꽉 차되 비율을 유지하도록 더 작은 배율 선택
        const scale = Math.min(scaleX, scaleY);
        
        canvas.style.transform = `scale(${scale})`;
    }

    function updateIframe() {
        let url = document.getElementById('urlInput').value;
        if (!url.startsWith('http')) url = 'https://' + url;
        document.getElementById('siteFrame').src = url;
    }

    // 화면 크기가 변할 때마다(회전 등) 배율 재계산
    window.addEventListener('resize', updateScale);
    window.onload = updateScale;
</script>

</body>
</html>
