<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>16:9 가로 뷰어</title>
    <style>
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background-color: #121212;
            color: white;
            font-family: sans-serif;
        }

        /* 주소 입력창 영역 */
        .url-bar {
            padding: 15px;
            display: flex;
            gap: 10px;
            background: #222;
        }
        input {
            flex: 1;
            padding: 10px;
            border-radius: 5px;
            border: none;
        }
        button {
            padding: 10px 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        /* 16:9 컨테이너 유지 영역 */
        .viewer-main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }

        .screen-container {
            width: 100%;
            position: relative;
            padding-top: 56.25%; /* 16:9 비율 */
            background: #000;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

<div class="url-bar">
    <input type="text" id="urlInput" placeholder="https://를 포함한 주소를 입력하세요">
    <button onclick="loadSite()">이동</button>
</div>

<div class="viewer-main">
    <div class="screen-container">
        <iframe id="siteFrame" src="about:blank"></iframe>
    </div>
</div>

<script>
    function loadSite() {
        let url = document.getElementById('urlInput').value;
        if (!url.startsWith('http')) {
            url = 'https://' + url;
        }
        document.getElementById('siteFrame').src = url;
    }
</script>

</body>
</html>
