<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>16:9 Fullscreen Viewer</title>
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #000;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            font-family: sans-serif;
        }

        #controls {
            padding: 10px;
            background: #222;
            display: flex;
            gap: 5px;
            z-index: 100;
        }
        input {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 4px;
            font-size: 16px;
        }
        button {
            padding: 10px 15px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
        }
        .full-btn {
            background: #28a745;
        }

        #fullscreen-root {
            flex: 1;
            position: relative;
            background: #000;
            width: 100%;
            height: 100%;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        :fullscreen #controls { display: none; }
    </style>
</head>
<body>

<div id="controls">
    <input type="text" id="urlInput" placeholder="https:// 주소 입력">
    <button onclick="updateIframe()">이동</button>
    <button class="full-btn" onclick="toggleFullScreen()">전체 화면</button>
</div>

<div id="fullscreen-root">
    <iframe id="siteFrame" src="about:blank"></iframe>
</div>

<script>
    const root = document.getElementById('fullscreen-root');
    const frame = document.getElementById('siteFrame');

    function updateScale() {
        const vW = root.clientWidth;
        const vH = root.clientHeight;

        const scaleX = vW / 1920;
        const scaleY = vH / 1080;
        
        const scale = Math.min(scaleX, scaleY);
        
        frame.style.transform = `scale(${scale})`;
        frame.style.transformOrigin = "0 0";
    }

    function updateIframe() {
        let url = document.getElementById('urlInput').value;
        if (!url.startsWith('http')) url = 'https://' + url;
        frame.src = url;
    }

    function toggleFullScreen() {
        if (!document.fullscreenElement) {
            root.requestFullscreen().catch(err => {
                alert(`전체 화면 불가: ${err.message}`);
            });
        } else {
            document.exitFullscreen();
        }
    }

    window.addEventListener('resize', () => {
        setTimeout(updateScale, 100);
    });
    window.onload = updateScale;
    
    document.addEventListener('fullscreenchange', updateScale);
</script>

</body>
</html>
