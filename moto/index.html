<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web-Based Car Systems</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background-color: #000;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            overflow: hidden; /* 스크롤 방지 */
            height: 100vh;
        }
        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .active-glow {
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
        }
    </style>
</head>
<body>

    <div class="flex h-screen w-screen p-4 gap-4">
        
        <nav class="w-20 glass rounded-3xl flex flex-col items-center py-6 justify-between">
            <div class="space-y-8 flex flex-col items-center">
                <button onclick="changeApp('home')" class="hover:scale-110 transition-transform text-2xl text-blue-400">
                    <i class="fas fa-th-large"></i>
                </button>
                <button onclick="changeApp('map')" class="hover:scale-110 transition-transform text-2xl text-gray-400">
                    <i class="fas fa-location-arrow"></i>
                </button>
                <button onclick="changeApp('music')" class="hover:scale-110 transition-transform text-2xl text-gray-400">
                    <i class="fas fa-music"></i>
                </button>
                <button onclick="changeApp('phone')" class="hover:scale-110 transition-transform text-2xl text-gray-400">
                    <i class="fas fa-phone"></i>
                </button>
            </div>
            
            <div class="text-center">
                <div id="clock" class="text-sm font-bold mb-2">12:00</div>
                <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-gray-700 to-gray-500 flex items-center justify-center cursor-pointer shadow-lg active:scale-95 transition-all">
                    <div class="w-4 h-4 rounded-full border-2 border-white"></div>
                </div>
            </div>
        </nav>

        <main id="main-app" class="flex-[2] glass rounded-3xl relative overflow-hidden group">
            <img src="https://images.unsplash.com/photo-1526725359915-d256ab4d41d6?auto=format&fit=crop&q=80&w=2000" 
                 class="absolute inset-0 w-full h-full object-cover opacity-60 group-hover:scale-105 transition-duration-500" alt="Map">
            
            <div class="absolute top-6 left-6 p-5 glass rounded-2xl flex items-center gap-4 active-glow animate-pulse">
                <div class="bg-blue-600 p-3 rounded-xl">
                    <i class="fas fa-arrow-up-right-dots text-2xl"></i>
                </div>
                <div>
                    <p class="text-xs text-gray-300">잠시 후 우회전</p>
                    <p class="text-xl font-bold">강남대로 영동대교 방면</p>
                </div>
            </div>
        </main>

        <aside class="flex-1 flex flex-col gap-4">
            <div class="flex-1 glass rounded-3xl p-6 flex flex-col justify-center items-center text-center">
                <img id="album-art" src="https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?auto=format&fit=crop&q=80&w=300" 
                     class="w-32 h-32 rounded-2xl shadow-2xl mb-4 rotate-3" alt="Album Art">
                <h3 class="text-xl font-bold">Stay With Me</h3>
                <p class="text-gray-400 text-sm mb-6">Miki Matsubara</p>
                
                <div class="flex items-center gap-8 text-2xl">
                    <i class="fas fa-backward cursor-pointer hover:text-blue-400"></i>
                    <i id="play-btn" class="fas fa-play cursor-pointer text-4xl hover:scale-110 transition-transform"></i>
                    <i class="fas fa-forward cursor-pointer hover:text-blue-400"></i>
                </div>
            </div>

            <div class="h-1/3 glass rounded-3xl p-6 flex items-center justify-around">
                <div class="text-center">
                    <i class="fas fa-sun text-yellow-400 text-3xl mb-2"></i>
                    <p class="text-sm font-medium">24°C</p>
                </div>
                <div class="h-10 w-[1px] bg-gray-700"></div>
                <div class="text-center">
                    <i class="fas fa-battery-three-quarters text-green-400 text-3xl mb-2"></i>
                    <p class="text-sm font-medium">78%</p>
                </div>
            </div>
        </aside>

    </div>

    <script>
        // 1. 시계 기능 구현
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('clock').textContent = `${hours}:${minutes}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // 2. 간단한 앱 전환 로직 (콘솔 확인용)
        function changeApp(appName) {
            console.log(`Switching to: ${appName}`);
            // 실제 구현 시에는 이 부분에서 main-app의 innerHTML을 변경하거나
            // Iframe 소스를 변경하여 다른 페이지를 보여줄 수 있습니다.
        }

        // 3. 재생 버튼 토글
        const playBtn = document.getElementById('play-btn');
        let isPlaying = false;
        playBtn.addEventListener('click', () => {
            isPlaying = !isPlaying;
            playBtn.className = isPlaying ? "fas fa-pause cursor-pointer text-4xl" : "fas fa-play cursor-pointer text-4xl";
        });
    </script>
</body>
</html>
