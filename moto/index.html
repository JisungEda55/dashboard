<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenSource Web Navigation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { background-color: #000; color: white; font-family: sans-serif; margin: 0; overflow: hidden; height: 100vh; }
        .glass { background: rgba(20, 20, 20, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        #map { width: 100%; height: 100%; border-radius: 1.5rem; z-index: 1; }
        /* 지도 내비게이션 UI 커스텀 */
        .leaflet-control-zoom { display: none; } 
        .leaflet-attribution-control { display: none; }
    </style>
</head>
<body>

    <div id="app-container" class="flex h-screen w-screen p-4 gap-4 bg-black">
        
        <nav class="w-20 glass rounded-3xl flex flex-col items-center py-6 justify-between z-10">
            <div class="space-y-8 flex flex-col items-center">
                <button class="text-2xl text-blue-400"><i class="fas fa-th-large"></i></button>
                <button class="text-2xl text-white"><i class="fas fa-map-marked-alt"></i></button>
                <button class="text-2xl text-gray-500"><i class="fas fa-music"></i></button>
            </div>
            
            <div class="flex flex-col items-center gap-6">
                <button onclick="toggleFullScreen()" class="w-12 h-12 rounded-full bg-gray-800 flex items-center justify-center hover:bg-gray-700 transition-all">
                    <i id="fullscreen-icon" class="fas fa-expand text-white"></i>
                </button>
                <div class="text-center">
                    <div id="clock" class="text-sm font-bold mb-2">00:00</div>
                    <div class="w-12 h-12 rounded-full bg-white flex items-center justify-center shadow-lg active:scale-90 transition-all cursor-pointer">
                        <div class="w-5 h-5 rounded-full border-2 border-black"></div>
                    </div>
                </div>
            </div>
        </nav>

        <main class="flex-[2] relative overflow-hidden group">
            <div id="map"></div>
            
            <div class="absolute top-6 left-6 p-5 glass rounded-2xl flex items-center gap-4 z-[1000] border-l-4 border-l-green-500 shadow-2xl">
                <div class="bg-green-600 p-3 rounded-xl">
                    <i class="fas fa-location-arrow text-2xl rotate-45"></i>
                </div>
                <div>
                    <p class="text-xs text-gray-400 font-bold uppercase tracking-wider">직진 1.2km</p>
                    <p class="text-xl font-bold">서울시청 방면</p>
                </div>
            </div>

            <div class="absolute bottom-6 left-6 flex gap-2 z-[1000]">
                <button onclick="zoomIn()" class="w-10 h-10 glass rounded-full flex items-center justify-center"><i class="fas fa-plus"></i></button>
                <button onclick="zoomOut()" class="w-10 h-10 glass rounded-full flex items-center justify-center"><i class="fas fa-minus"></i></button>
                <button onclick="locateMe()" class="w-10 h-10 glass rounded-full flex items-center justify-center text-blue-400"><i class="fas fa-crosshairs"></i></button>
            </div>
        </main>

        <aside class="flex-1 flex flex-col gap-4 z-10">
            <div class="flex-1 glass rounded-3xl p-6 flex flex-col justify-between">
                <div class="flex items-center gap-3">
                    <i class="fab fa-spotify text-green-500 text-2xl"></i>
                    <span class="text-xs font-bold text-gray-400 uppercase">Now Playing</span>
                </div>
                <div class="text-center">
                    <div class="w-32 h-32 mx-auto bg-gradient-to-br from-purple-600 to-blue-500 rounded-2xl shadow-xl flex items-center justify-center mb-4">
                        <i class="fas fa-music text-4xl"></i>
                    </div>
                    <h3 class="text-xl font-bold truncate">Drive & Chill</h3>
                    <p class="text-gray-400 text-sm">Lo-fi Beats</p>
                </div>
                <div class="flex justify-around items-center pt-4">
                    <i class="fas fa-step-backward text-xl"></i>
                    <i class="fas fa-play text-3xl"></i>
                    <i class="fas fa-step-forward text-xl"></i>
                </div>
            </div>

            <div class="h-1/3 glass rounded-3xl p-6 grid grid-cols-2 gap-4">
                <div class="flex flex-col justify-center items-center bg-white/5 rounded-2xl">
                    <i class="fas fa-temperature-high text-orange-400 mb-1"></i>
                    <span class="text-lg font-bold">21°C</span>
                </div>
                <div class="flex flex-col justify-center items-center bg-white/5 rounded-2xl">
                    <i class="fas fa-wind text-blue-300 mb-1"></i>
                    <span class="text-lg font-bold">15m/s</span>
                </div>
            </div>
        </aside>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. 지도 초기화 (서울 중심)
        const map = L.map('map').setView([37.5665, 126.9780], 15);

        // 2. 지도 타일 레이어 추가 (CartoDB Dark Matter 사용 - 차량용에 적합한 다크모드)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            maxZoom: 19
        }).addTo(map);

        // 3. 커스텀 아이콘 (내 위치 표시)
        const carIcon = L.divIcon({
            html: '<div style="width: 20px; height: 20px; background: #3b82f6; border: 3px solid white; border-radius: 50%; box-shadow: 0 0 15px #3b82f6;"></div>',
            className: ''
        });
        let marker = L.marker([37.5665, 126.9780], {icon: carIcon}).addTo(map);

        // 4. 지도 컨트롤 함수
        function zoomIn() { map.zoomIn(); }
        function zoomOut() { map.zoomOut(); }
        function locateMe() {
            map.locate({setView: true, maxZoom: 16});
        }
        map.on('locationfound', (e) => {
            marker.setLatLng(e.latlng);
        });

        // 5. 시계 업데이트
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = 
                String(now.getHours()).padStart(2, '0') + ":" + 
                String(now.getMinutes()).padStart(2, '0');
        }
        setInterval(updateClock, 1000);
        updateClock();

        // 6. 전체 화면 기능
        function toggleFullScreen() {
            const icon = document.getElementById('fullscreen-icon');
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
                icon.classList.replace('fa-expand', 'fa-compress');
            } else {
                document.exitFullscreen();
                icon.classList.replace('fa-compress', 'fa-expand');
            }
        }
    </script>
</body>
</html>
