<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Android Auto Web Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #000; color: white; font-family: sans-serif; margin: 0; overflow: hidden; height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        /* 전체화면 시 브라우저 기본 스크롤바 숨기기 */
        :-webkit-full-screen { width: 100%; height: 100%; }
    </style>
</head>
<body>

    <div id="app-container" class="flex h-screen w-screen p-4 gap-4 bg-black">
        
        <nav class="w-20 glass rounded-3xl flex flex-col items-center py-6 justify-between">
            <div class="space-y-8 flex flex-col items-center">
                <button class="text-2xl text-blue-400"><i class="fas fa-th-large"></i></button>
                <button class="text-2xl text-gray-400"><i class="fas fa-location-arrow"></i></button>
                <button class="text-2xl text-gray-400"><i class="fas fa-music"></i></button>
            </div>
            
            <div class="flex flex-col items-center gap-6">
                <button onclick="toggleFullScreen()" class="w-12 h-12 rounded-full bg-gray-800 flex items-center justify-center hover:bg-gray-700 transition-colors">
                    <i id="fullscreen-icon" class="fas fa-expand text-lg text-white"></i>
                </button>

                <div class="text-center">
                    <div id="clock" class="text-sm font-bold mb-2">12:00</div>
                    <div class="w-12 h-12 rounded-full bg-gradient-to-tr from-gray-700 to-gray-500 flex items-center justify-center cursor-pointer shadow-lg active:scale-90 transition-all">
                        <div class="w-5 h-5 rounded-full border-2 border-white"></div>
                    </div>
                </div>
            </div>
        </nav>

        <main class="flex-[2] glass rounded-3xl relative overflow-hidden group">
            <img src="https://images.unsplash.com/photo-1569336415962-a4bd9f69cd83?auto=format&fit=crop&q=80&w=2000" 
                 class="absolute inset-0 w-full h-full object-cover opacity-60" alt="Map">
            <div class="absolute top-6 left-6 p-5 glass rounded-2xl flex items-center gap-4">
                <div class="bg-green-600 p-3 rounded-xl"><i class="fas fa-turn-up text-2xl rotate-90"></i></div>
                <div>
                    <p class="text-xs text-gray-300">300m 앞</p>
                    <p class="text-xl font-bold">목적지 도착 예정</p>
                </div>
            </div>
        </main>

        <aside class="flex-1 flex flex-col gap-4">
            <div class="flex-1 glass rounded-3xl p-6 flex flex-col justify-center items-center">
                <div class="w-32 h-32 bg-gray-700 rounded-2xl mb-4 flex items-center justify-center">
                    <i class="fas fa-compact-disc fa-spin text-5xl text-gray-500"></i>
                </div>
                <h3 class="text-lg font-bold">재생 중인 곡 없음</h3>
                <p class="text-gray-400 text-sm">연결을 확인하세요</p>
            </div>
            <div class="h-1/3 glass rounded-3xl p-6 flex items-center justify-around">
                <div class="text-center">
                    <i class="fas fa-cloud-sun text-orange-400 text-3xl mb-1"></i>
                    <p class="text-xs">맑음 22°</p>
                </div>
                <div class="text-center">
                    <i class="fas fa-tachometer-alt text-blue-400 text-3xl mb-1"></i>
                    <p class="text-xs">0 km/h</p>
                </div>
            </div>
        </aside>
    </div>

    <script>
        // 시계 업데이트
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = 
                String(now.getHours()).padStart(2, '0') + ":" + 
                String(now.getMinutes()).padStart(2, '0');
        }
        setInterval(updateClock, 1000);
        updateClock();

        // 전체 화면 토글 함수
        function toggleFullScreen() {
            const doc = document.documentElement; // 페이지 전체
            const icon = document.getElementById('fullscreen-icon');

            if (!document.fullscreenElement) {
                // 전체 화면 요청
                doc.requestFullscreen().then(() => {
                    icon.classList.replace('fa-expand', 'fa-compress');
                }).catch(err => {
                    alert(`전체 화면 전환 실패: ${err.message}`);
                });
            } else {
                // 전체 화면 해제
                document.exitFullscreen().then(() => {
                    icon.classList.replace('fa-compress', 'fa-expand');
                });
            }
        }

        // 사용자가 ESC 키로 전체화면을 나갔을 때 아이콘 상태 동기화
        document.addEventListener('fullscreenchange', () => {
            const icon = document.getElementById('fullscreen-icon');
            if (!document.fullscreenElement) {
                icon.classList.replace('fa-compress', 'fa-expand');
            }
        });
    </script>
</body>
</html>
